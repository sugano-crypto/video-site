<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>会員限定動画サイト</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
      min-height: 100vh;
    }

    /* ===== ログイン・パスワード系 共通カード ===== */
    .auth-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .auth-screen.active { display: flex; }
    .auth-box {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo h1 { font-size: 22px; font-weight: 700; color: #fff; }
    .auth-logo p  { font-size: 13px; color: #aaa; margin-top: 6px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; color: #bbb; margin-bottom: 7px; }
    .form-group input {
      width: 100%; padding: 12px 14px;
      background: #2a2a2a; border: 1px solid #444;
      border-radius: 7px; color: #f1f1f1; font-size: 15px;
      outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #ff4444; }
    .auth-btn {
      width: 100%; padding: 13px;
      background: #ff0000; color: #fff;
      border: none; border-radius: 7px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; margin-top: 8px;
      transition: background 0.2s;
    }
    .auth-btn:hover { background: #cc0000; }
    .auth-btn:disabled { background: #666; cursor: not-allowed; }
    .text-link {
      display: block; text-align: center;
      color: #aaa; font-size: 13px;
      margin-top: 18px; cursor: pointer;
      text-decoration: underline;
    }
    .text-link:hover { color: #fff; }
    .msg { font-size: 13px; text-align: center; margin-top: 14px; min-height: 18px; }
    .msg.error   { color: #ff6b6b; }
    .msg.success { color: #4caf50; }

    /* ===== メイン画面 ===== */
    #main-screen { display: none; }
    .header {
      background: #111; border-bottom: 1px solid #222;
      padding: 0 24px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .header-title { font-size: 18px; font-weight: 700; color: #fff; }
    .header-title span { color: #ff0000; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .user-email { font-size: 12px; color: #888; }
    .header-btn {
      background: transparent; border: 1px solid #555;
      color: #bbb; padding: 6px 14px;
      border-radius: 6px; font-size: 13px;
      cursor: pointer; transition: all 0.2s;
    }
    .header-btn:hover { border-color: #ff4444; color: #fff; }

    /* 動画グリッド */
    .container { max-width: 1280px; margin: 0 auto; padding: 28px 20px; }
    .section-title {
      font-size: 15px; color: #aaa;
      margin-bottom: 20px; padding-bottom: 10px;
      border-bottom: 1px solid #222;
    }
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 22px;
    }
    .video-card {
      background: #1a1a1a; border-radius: 10px;
      overflow: hidden; cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s;
      text-decoration: none; color: inherit;
      display: block; border: 1px solid #222;
    }
    .video-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      border-color: #444;
    }
    .thumbnail-wrap {
      position: relative; width: 100%;
      padding-top: 56.25%; background: #111; overflow: hidden;
    }
    .thumbnail-wrap img {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.3s;
    }
    .video-card:hover .thumbnail-wrap img { transform: scale(1.04); }
    .play-icon {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 52px; height: 52px;
      background: rgba(255,0,0,0.85); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
    }
    .play-icon::after {
      content: ''; border-style: solid;
      border-width: 9px 0 9px 18px;
      border-color: transparent transparent transparent #fff;
      margin-left: 3px;
    }
    .video-card:hover .play-icon { opacity: 1; }
    .video-info { padding: 14px 14px 16px; }
    .video-title {
      font-size: 14px; font-weight: 600; color: #f1f1f1;
      line-height: 1.45; margin-bottom: 7px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .video-desc {
      font-size: 12px; color: #888; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 8px;
    }
    .video-date { font-size: 11px; color: #555; }
    .loading { text-align: center; padding: 80px 20px; color: #666; font-size: 15px; }

    @media (max-width: 600px) {
      .video-grid { grid-template-columns: 1fr; gap: 16px; }
      .auth-box { padding: 36px 24px; }
      .user-email { display: none; }
    }
  </style>
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div id="login-screen" class="auth-screen active">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>🎬 会員限定動画</h1>
      <p>IDとパスワードを入力してください</p>
    </div>
    <div class="form-group">
      <label>メールアドレス（ID）</label>
      <input type="email" id="login-email" placeholder="example@email.com" autocomplete="username" />
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" id="login-pw" placeholder="パスワードを入力" autocomplete="current-password" />
    </div>
    <button class="auth-btn" id="login-btn" onclick="doLogin()">ログイン</button>
    <span class="text-link" onclick="showReset()">パスワードをお忘れの方はこちら</span>
    <div class="msg error" id="login-msg"></div>
  </div>
</div>

<!-- ===== パスワードリセット申請画面 ===== -->
<div id="reset-screen" class="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>🔑 パスワードリセット</h1>
      <p>登録済みのメールアドレスを入力してください</p>
    </div>
    <div class="form-group">
      <label>メールアドレス</label>
      <input type="email" id="reset-email" placeholder="example@email.com" />
    </div>
    <button class="auth-btn" id="reset-btn" onclick="doReset()">リセットメールを送信</button>
    <span class="text-link" onclick="showLogin()">← ログインに戻る</span>
    <div class="msg" id="reset-msg"></div>
  </div>
</div>

<!-- ===== 新パスワード設定画面（リセットリンクから遷移） ===== -->
<div id="newpw-screen" class="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>🔒 新しいパスワード設定</h1>
      <p>新しいパスワードを入力してください</p>
    </div>
    <div class="form-group">
      <label>新しいパスワード</label>
      <input type="password" id="newpw-input" placeholder="8文字以上" />
    </div>
    <div class="form-group">
      <label>確認（もう一度入力）</label>
      <input type="password" id="newpw-confirm" placeholder="同じパスワードを入力" />
    </div>
    <button class="auth-btn" id="newpw-btn" onclick="doSetNewPassword()">パスワードを変更する</button>
    <div class="msg" id="newpw-msg"></div>
  </div>
</div>

<!-- ===== メイン画面 ===== -->
<div id="main-screen">
  <header class="header">
    <div class="header-title"><span>▶</span> 会員限定動画</div>
    <div class="header-right">
      <span class="user-email" id="user-email"></span>
      <button class="header-btn" onclick="showChangePassword()">パスワード変更</button>
      <button class="header-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </header>
  <div class="container">
    <div class="section-title" id="video-count">動画を読み込んでいます...</div>
    <div class="video-grid" id="video-grid">
      <div class="loading">読み込み中...</div>
    </div>
  </div>
</div>

<!-- ===== パスワード変更モーダル（ログイン中） ===== -->
<div id="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; align-items:center; justify-content:center;">
  <div class="auth-box" style="max-width:380px;">
    <div class="auth-logo">
      <h1>🔒 パスワード変更</h1>
    </div>
    <div class="form-group">
      <label>新しいパスワード</label>
      <input type="password" id="change-newpw" placeholder="8文字以上" />
    </div>
    <div class="form-group">
      <label>確認（もう一度入力）</label>
      <input type="password" id="change-confirm" placeholder="同じパスワードを入力" />
    </div>
    <button class="auth-btn" onclick="doChangePassword()">変更する</button>
    <span class="text-link" onclick="closeModal()">キャンセル</span>
    <div class="msg" id="change-msg"></div>
  </div>
</div>

<script>
  // ============================================================
  // Supabase 初期化
  // ============================================================
  const SUPABASE_URL = "https://bicqctaxvponqbzjsjbw.supabase.co";
  const SUPABASE_KEY = "sb_publishable_YddDRAknpjNTrpq6dMVrjQ_VSrb14Yr";
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // ============================================================
  // 画面切替
  // ============================================================
  const screens = ["login-screen","reset-screen","newpw-screen"];
  function showScreen(id) {
    screens.forEach(s => {
      const el = document.getElementById(s);
      el.classList.remove("active");
    });
    document.getElementById("main-screen").style.display = "none";
    if (id) document.getElementById(id).classList.add("active");
  }
  function showLogin()  { showScreen("login-screen"); }
  function showReset()  { showScreen("reset-screen"); }
  function showMain()   { showScreen(null); document.getElementById("main-screen").style.display = "block"; }

  // ============================================================
  // ログイン
  // ============================================================
  async function doLogin() {
    const email = document.getElementById("login-email").value.trim();
    const pw    = document.getElementById("login-pw").value;
    const msg   = document.getElementById("login-msg");
    const btn   = document.getElementById("login-btn");
    msg.textContent = "";
    btn.disabled = true; btn.textContent = "ログイン中...";

    const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
    btn.disabled = false; btn.textContent = "ログイン";

    if (error) {
      msg.textContent = "IDまたはパスワードが正しくありません";
    } else {
      document.getElementById("user-email").textContent = data.user.email;
      showMain();
      loadVideos();
    }
  }

  // ============================================================
  // パスワードリセット申請（メール送信）
  // ============================================================
  async function doReset() {
    const email = document.getElementById("reset-email").value.trim();
    const msg   = document.getElementById("reset-msg");
    const btn   = document.getElementById("reset-btn");
    msg.textContent = ""; msg.className = "msg";
    btn.disabled = true; btn.textContent = "送信中...";

    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.href
    });
    btn.disabled = false; btn.textContent = "リセットメールを送信";

    if (error) {
      msg.className = "msg error";
      msg.textContent = "送信に失敗しました。メールアドレスを確認してください。";
    } else {
      msg.className = "msg success";
      msg.textContent = "メールを送信しました。受信箱をご確認ください。";
    }
  }

  // ============================================================
  // 新パスワード設定（リセットリンクから）
  // ============================================================
  async function doSetNewPassword() {
    const pw1 = document.getElementById("newpw-input").value;
    const pw2 = document.getElementById("newpw-confirm").value;
    const msg = document.getElementById("newpw-msg");
    const btn = document.getElementById("newpw-btn");
    msg.textContent = ""; msg.className = "msg";

    if (pw1.length < 8) {
      msg.className = "msg error"; msg.textContent = "パスワードは8文字以上にしてください"; return;
    }
    if (pw1 !== pw2) {
      msg.className = "msg error"; msg.textContent = "パスワードが一致しません"; return;
    }
    btn.disabled = true; btn.textContent = "変更中...";
    const { error } = await sb.auth.updateUser({ password: pw1 });
    btn.disabled = false; btn.textContent = "パスワードを変更する";

    if (error) {
      msg.className = "msg error"; msg.textContent = "変更に失敗しました: " + error.message;
    } else {
      msg.className = "msg success"; msg.textContent = "パスワードを変更しました！";
      setTimeout(() => { showMain(); loadVideos(); }, 1500);
    }
  }

  // ============================================================
  // パスワード変更（ログイン中・モーダル）
  // ============================================================
  function showChangePassword() {
    document.getElementById("change-newpw").value = "";
    document.getElementById("change-confirm").value = "";
    document.getElementById("change-msg").textContent = "";
    document.getElementById("modal-overlay").style.display = "flex";
  }
  function closeModal() {
    document.getElementById("modal-overlay").style.display = "none";
  }
  async function doChangePassword() {
    const pw1 = document.getElementById("change-newpw").value;
    const pw2 = document.getElementById("change-confirm").value;
    const msg = document.getElementById("change-msg");
    msg.textContent = ""; msg.className = "msg";

    if (pw1.length < 8) {
      msg.className = "msg error"; msg.textContent = "8文字以上で入力してください"; return;
    }
    if (pw1 !== pw2) {
      msg.className = "msg error"; msg.textContent = "パスワードが一致しません"; return;
    }
    const { error } = await sb.auth.updateUser({ password: pw1 });
    if (error) {
      msg.className = "msg error"; msg.textContent = "変更失敗: " + error.message;
    } else {
      msg.className = "msg success"; msg.textContent = "パスワードを変更しました！";
      setTimeout(closeModal, 1500);
    }
  }

  // ============================================================
  // ログアウト
  // ============================================================
  async function doLogout() {
    await sb.auth.signOut();
    showLogin();
  }

  // ============================================================
  // 動画一覧読み込み
  // ============================================================
  async function loadVideos() {
    try {
      const res = await fetch("videos.json?t=" + Date.now());
      const videos = await res.json();
      videos.sort((a, b) => new Date(b.date) - new Date(a.date));
      document.getElementById("video-count").textContent = `全 ${videos.length} 本の動画`;
      const grid = document.getElementById("video-grid");
      grid.innerHTML = videos.map(v => `
        <a class="video-card" href="${esc(v.url)}" target="_blank" rel="noopener noreferrer">
          <div class="thumbnail-wrap">
            <img src="https://img.youtube.com/vi/${esc(v.id)}/hqdefault.jpg"
                 alt="${esc(v.title)}" loading="lazy"
                 onerror="this.src='https://img.youtube.com/vi/${esc(v.id)}/mqdefault.jpg'" />
            <div class="play-icon"></div>
          </div>
          <div class="video-info">
            <div class="video-title">${esc(v.title)}</div>
            <div class="video-desc">${esc(v.description)}</div>
            <div class="video-date">${fmtDate(v.date)}</div>
          </div>
        </a>
      `).join("");
    } catch {
      document.getElementById("video-grid").innerHTML =
        '<div class="loading">動画データの読み込みに失敗しました。</div>';
    }
  }

  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function fmtDate(d) {
    const dt = new Date(d);
    return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日`;
  }

  // ============================================================
  // 初期化：セッション確認 & リセットリンク検出
  // ============================================================
  window.addEventListener("DOMContentLoaded", async () => {
    // URLにパスワードリセットのトークンが含まれている場合
    const hash = window.location.hash;
    if (hash.includes("type=recovery")) {
      showScreen("newpw-screen");
      return;
    }

    // 既存セッション確認
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      document.getElementById("user-email").textContent = session.user.email;
      showMain();
      loadVideos();
    } else {
      showLogin();
    }
  });

  // Enterキーでログイン
  document.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      if (document.getElementById("login-screen").classList.contains("active")) doLogin();
      if (document.getElementById("reset-screen").classList.contains("active")) doReset();
    }
  });
</script>
</body>
</html>
