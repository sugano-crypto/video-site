<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>すがコンサルティング＆パートナーズ｜会員限定動画</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #1a3a5c;
      --navy-dark: #102640;
      --navy-mid:  #2a5298;
      --sky:       #4a90d9;
      --sky-light: #e8f4fd;
      --accent:    #c0392b;
      --white:     #ffffff;
      --gray-100:  #f5f8fc;
      --gray-200:  #e8eef5;
      --gray-400:  #8fa3b8;
      --gray-600:  #4a6280;
      --text:      #1e3450;
    }

    body {
      font-family: 'Noto Sans JP', 'Helvetica Neue', Arial, sans-serif;
      background: var(--gray-100);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== 認証画面共通 ===== */
    .auth-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      background: linear-gradient(145deg, #eaf3fb 0%, #f5f8fc 50%, #e8f0f8 100%);
    }
    .auth-screen.active { display: flex; }

    .auth-card {
      background: var(--white);
      border-radius: 16px;
      padding: 48px 44px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(26,58,92,0.10), 0 1px 4px rgba(26,58,92,0.06);
    }

    /* ロゴ＆会社名 */
    .brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .brand img {
      width: 110px;
      height: 110px;
      object-fit: contain;
      margin-bottom: 10px;
    }
    .brand-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: 0.03em;
      line-height: 1.5;
    }
    .brand-sub {
      font-size: 12px;
      color: var(--gray-400);
      margin-top: 4px;
      font-weight: 300;
    }

    /* フォーム */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--gray-600);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      background: var(--gray-100);
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      border-color: var(--sky);
      box-shadow: 0 0 0 3px rgba(74,144,217,0.12);
      background: var(--white);
    }

    .auth-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--navy-mid) 0%, var(--navy) 100%);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 6px;
      letter-spacing: 0.06em;
      transition: opacity 0.2s, transform 0.1s;
    }
    .auth-btn:hover   { opacity: 0.88; }
    .auth-btn:active  { transform: scale(0.99); }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .text-link {
      display: block;
      text-align: center;
      color: var(--sky);
      font-size: 13px;
      margin-top: 18px;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s;
    }
    .text-link:hover { color: var(--navy); text-decoration: underline; }

    .msg { font-size: 12px; text-align: center; margin-top: 12px; min-height: 16px; }
    .msg.error   { color: var(--accent); }
    .msg.success { color: #27ae60; }

    .divider {
      border: none;
      border-top: 1px solid var(--gray-200);
      margin: 24px 0 20px;
    }

    /* ===== ヘッダー ===== */
    #main-screen { display: none; }

    .header {
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      padding: 0 28px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 6px rgba(26,58,92,0.07);
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      width: 38px;
      height: 38px;
      object-fit: contain;
    }
    .header-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--navy);
      line-height: 1.3;
    }
    .header-title span {
      display: block;
      font-size: 10px;
      font-weight: 400;
      color: var(--gray-400);
      letter-spacing: 0.05em;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .user-email {
      font-size: 12px;
      color: var(--gray-400);
    }
    .header-btn {
      background: transparent;
      border: 1.5px solid var(--gray-200);
      color: var(--gray-600);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .header-btn:hover {
      border-color: var(--sky);
      color: var(--navy);
      background: var(--sky-light);
    }

    /* ===== 動画グリッド ===== */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--gray-200);
    }
    .section-header::before {
      content: '';
      display: block;
      width: 4px;
      height: 20px;
      background: linear-gradient(to bottom, var(--sky), var(--navy));
      border-radius: 2px;
    }
    .section-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-600);
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .video-card {
      background: var(--white);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s;
      text-decoration: none;
      color: inherit;
      display: block;
      border: 1px solid var(--gray-200);
    }
    .video-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(26,58,92,0.13);
      border-color: #c5d9ee;
    }

    .thumbnail-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: var(--gray-200);
      overflow: hidden;
    }
    .thumbnail-wrap img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }
    .video-card:hover .thumbnail-wrap img { transform: scale(1.04); }

    .play-icon {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 48px; height: 48px;
      background: rgba(26, 58, 92, 0.82);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .play-icon::after {
      content: '';
      border-style: solid;
      border-width: 8px 0 8px 16px;
      border-color: transparent transparent transparent var(--white);
      margin-left: 3px;
    }
    .video-card:hover .play-icon { opacity: 1; }

    .video-info { padding: 14px 16px 16px; }
    .video-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .video-desc {
      font-size: 12px;
      color: var(--gray-400);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .video-date {
      font-size: 11px;
      color: var(--gray-400);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .video-date::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--sky);
      border-radius: 50%;
    }

    .loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--gray-400);
      font-size: 14px;
    }

    /* ===== パスワード変更モーダル ===== */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(26,58,92,0.4);
      backdrop-filter: blur(3px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 600px) {
      .video-grid { grid-template-columns: 1fr; gap: 14px; }
      .auth-card { padding: 36px 24px 32px; }
      .user-email { display: none; }
      .header { padding: 0 16px; }
    }
  </style>
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div id="login-screen" class="auth-screen active">
  <div class="auth-card">
    <div class="brand">
      <img src="logo.png" alt="すがコンサルティング＆パートナーズ ロゴ" />
      <div class="brand-name">すがコンサルティング＆パートナーズ</div>
      <div class="brand-sub">会員限定動画ポータル</div>
    </div>
    <div class="form-group">
      <label>メールアドレス（ID）</label>
      <input type="email" id="login-email" placeholder="example@email.com" autocomplete="username" />
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" id="login-pw" placeholder="パスワードを入力" autocomplete="current-password" />
    </div>
    <button class="auth-btn" id="login-btn" onclick="doLogin()">ログイン</button>
    <span class="text-link" onclick="showReset()">パスワードをお忘れの方はこちら</span>
    <div class="msg error" id="login-msg"></div>
  </div>
</div>

<!-- ===== パスワードリセット申請 ===== -->
<div id="reset-screen" class="auth-screen">
  <div class="auth-card">
    <div class="brand">
      <img src="logo.png" alt="ロゴ" />
      <div class="brand-name">パスワードのリセット</div>
      <div class="brand-sub">登録メールアドレスにリンクを送信します</div>
    </div>
    <div class="form-group">
      <label>メールアドレス</label>
      <input type="email" id="reset-email" placeholder="example@email.com" />
    </div>
    <button class="auth-btn" id="reset-btn" onclick="doReset()">リセットメールを送信</button>
    <span class="text-link" onclick="showLogin()">← ログインに戻る</span>
    <div class="msg" id="reset-msg"></div>
  </div>
</div>

<!-- ===== 新パスワード設定（リセットリンクから） ===== -->
<div id="newpw-screen" class="auth-screen">
  <div class="auth-card">
    <div class="brand">
      <img src="logo.png" alt="ロゴ" />
      <div class="brand-name">新しいパスワードの設定</div>
      <div class="brand-sub">8文字以上で設定してください</div>
    </div>
    <div class="form-group">
      <label>新しいパスワード</label>
      <input type="password" id="newpw-input" placeholder="8文字以上" />
    </div>
    <div class="form-group">
      <label>確認（もう一度入力）</label>
      <input type="password" id="newpw-confirm" placeholder="同じパスワードを入力" />
    </div>
    <button class="auth-btn" id="newpw-btn" onclick="doSetNewPassword()">パスワードを設定する</button>
    <div class="msg" id="newpw-msg"></div>
  </div>
</div>

<!-- ===== メイン画面 ===== -->
<div id="main-screen">
  <header class="header">
    <div class="header-brand">
      <img src="logo.png" alt="ロゴ" class="header-logo" />
      <div class="header-title">
        すがコンサルティング＆パートナーズ
        <span>会員限定動画ポータル</span>
      </div>
    </div>
    <div class="header-right">
      <span class="user-email" id="user-email"></span>
      <button class="header-btn" onclick="showChangePassword()">パスワード変更</button>
      <button class="header-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </header>
  <div class="container">
    <div class="section-header">
      <div class="section-title" id="video-count">動画を読み込んでいます...</div>
    </div>
    <div class="video-grid" id="video-grid">
      <div class="loading">読み込み中...</div>
    </div>
  </div>
</div>

<!-- ===== パスワード変更モーダル ===== -->
<div id="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(26,58,92,0.4); backdrop-filter:blur(3px); z-index:200; align-items:center; justify-content:center;">
  <div class="auth-card" style="max-width:380px;">
    <div class="brand">
      <div class="brand-name">パスワードの変更</div>
    </div>
    <div class="form-group">
      <label>新しいパスワード</label>
      <input type="password" id="change-newpw" placeholder="8文字以上" />
    </div>
    <div class="form-group">
      <label>確認（もう一度入力）</label>
      <input type="password" id="change-confirm" placeholder="同じパスワードを入力" />
    </div>
    <button class="auth-btn" onclick="doChangePassword()">変更する</button>
    <span class="text-link" onclick="closeModal()">キャンセル</span>
    <div class="msg" id="change-msg"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://bicqctaxvponqbzjsjbw.supabase.co";
  const SUPABASE_KEY = "sb_publishable_YddDRAknpjNTrpq6dMVrjQ_VSrb14Yr";
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  const screens = ["login-screen","reset-screen","newpw-screen"];
  function showScreen(id) {
    screens.forEach(s => document.getElementById(s).classList.remove("active"));
    document.getElementById("main-screen").style.display = "none";
    if (id) document.getElementById(id).classList.add("active");
  }
  function showLogin()  { showScreen("login-screen"); }
  function showReset()  { showScreen("reset-screen"); }
  function showMain()   { showScreen(null); document.getElementById("main-screen").style.display = "block"; }

  async function doLogin() {
    const email = document.getElementById("login-email").value.trim();
    const pw    = document.getElementById("login-pw").value;
    const msg   = document.getElementById("login-msg");
    const btn   = document.getElementById("login-btn");
    msg.textContent = "";
    btn.disabled = true; btn.textContent = "ログイン中...";
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
    btn.disabled = false; btn.textContent = "ログイン";
    if (error) {
      msg.textContent = "メールアドレスまたはパスワードが正しくありません";
    } else {
      document.getElementById("user-email").textContent = data.user.email;
      showMain(); loadVideos();
    }
  }

  async function doReset() {
    const email = document.getElementById("reset-email").value.trim();
    const msg   = document.getElementById("reset-msg");
    const btn   = document.getElementById("reset-btn");
    msg.textContent = ""; msg.className = "msg";
    btn.disabled = true; btn.textContent = "送信中...";
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.href
    });
    btn.disabled = false; btn.textContent = "リセットメールを送信";
    if (error) {
      msg.className = "msg error";
      msg.textContent = "送信に失敗しました。メールアドレスをご確認ください。";
    } else {
      msg.className = "msg success";
      msg.textContent = "送信しました。受信箱をご確認ください。";
    }
  }

  async function doSetNewPassword() {
    const pw1 = document.getElementById("newpw-input").value;
    const pw2 = document.getElementById("newpw-confirm").value;
    const msg = document.getElementById("newpw-msg");
    const btn = document.getElementById("newpw-btn");
    msg.textContent = ""; msg.className = "msg";
    if (pw1.length < 8) { msg.className="msg error"; msg.textContent="8文字以上で入力してください"; return; }
    if (pw1 !== pw2)    { msg.className="msg error"; msg.textContent="パスワードが一致しません"; return; }
    btn.disabled = true; btn.textContent = "変更中...";
    const { error } = await sb.auth.updateUser({ password: pw1 });
    btn.disabled = false; btn.textContent = "パスワードを設定する";
    if (error) {
      msg.className = "msg error"; msg.textContent = "変更に失敗しました: " + error.message;
    } else {
      msg.className = "msg success"; msg.textContent = "パスワードを設定しました！";
      setTimeout(() => { showMain(); loadVideos(); }, 1500);
    }
  }

  function showChangePassword() {
    document.getElementById("change-newpw").value = "";
    document.getElementById("change-confirm").value = "";
    document.getElementById("change-msg").textContent = "";
    document.getElementById("modal-overlay").style.display = "flex";
  }
  function closeModal() {
    document.getElementById("modal-overlay").style.display = "none";
  }
  async function doChangePassword() {
    const pw1 = document.getElementById("change-newpw").value;
    const pw2 = document.getElementById("change-confirm").value;
    const msg = document.getElementById("change-msg");
    msg.textContent = ""; msg.className = "msg";
    if (pw1.length < 8) { msg.className="msg error"; msg.textContent="8文字以上で入力してください"; return; }
    if (pw1 !== pw2)    { msg.className="msg error"; msg.textContent="パスワードが一致しません"; return; }
    const { error } = await sb.auth.updateUser({ password: pw1 });
    if (error) {
      msg.className = "msg error"; msg.textContent = "変更失敗: " + error.message;
    } else {
      msg.className = "msg success"; msg.textContent = "変更しました！";
      setTimeout(closeModal, 1500);
    }
  }

  async function doLogout() {
    await sb.auth.signOut();
    showLogin();
  }

  async function loadVideos() {
    try {
      const res = await fetch("videos.json?t=" + Date.now());
      const videos = await res.json();
      videos.sort((a, b) => new Date(b.date) - new Date(a.date));
      document.getElementById("video-count").textContent = `全 ${videos.length} 本の動画`;
      const grid = document.getElementById("video-grid");
      grid.innerHTML = videos.map(v => `
        <a class="video-card" href="${esc(v.url)}" target="_blank" rel="noopener noreferrer">
          <div class="thumbnail-wrap">
            <img src="https://img.youtube.com/vi/${esc(v.id)}/hqdefault.jpg"
                 alt="${esc(v.title)}" loading="lazy"
                 onerror="this.src='https://img.youtube.com/vi/${esc(v.id)}/mqdefault.jpg'" />
            <div class="play-icon"></div>
          </div>
          <div class="video-info">
            <div class="video-title">${esc(v.title)}</div>
            <div class="video-desc">${esc(v.description)}</div>
            <div class="video-date">${fmtDate(v.date)}</div>
          </div>
        </a>
      `).join("");
    } catch {
      document.getElementById("video-grid").innerHTML =
        '<div class="loading">動画データの読み込みに失敗しました。</div>';
    }
  }

  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function fmtDate(d) {
    const dt = new Date(d);
    return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日`;
  }

  window.addEventListener("DOMContentLoaded", async () => {
    if (window.location.hash.includes("type=recovery")) {
      showScreen("newpw-screen"); return;
    }
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      document.getElementById("user-email").textContent = session.user.email;
      showMain(); loadVideos();
    } else {
      showLogin();
    }
  });

  document.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      if (document.getElementById("login-screen").classList.contains("active")) doLogin();
      if (document.getElementById("reset-screen").classList.contains("active")) doReset();
    }
  });
</script>
</body>
</html>
